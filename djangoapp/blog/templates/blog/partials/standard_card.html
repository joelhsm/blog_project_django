{% if page_obj|slice:"2:" %}
    {% for item in page_obj|slice:"2:" %}   
        <article class="md:col-span-4 group mt-8">
            <div class="bg-surface-container-lowest transition-colors duration-500 hover:bg-surface-container-high">
                {% if item.cover %}
                    <div class="relative aspect-video mb-6 overflow-hidden">
                        <img class="w-full h-full object-cover rounded-md grayscale hover:grayscale-0 transition-all duration-700"
                            data-alt="Blurry blue computer screens in dark room"
                            src="{{ item.cover.url }}" />
                    </div>
                {% endif %}
                <div class="px-2">
                    {% if item.category %}
                        <span
                            class="font-label text-xs text-on-surface-variant font-bold tracking-widest uppercase mb-3 block">{{ item.category.name }}</span>
                    {% endif %}
                    {% if item.title %}
                        <h3 class="text-2xl font-headline text-on-surface mb-4 group-hover:text-primary transition-colors">{{ item.title }}</h3>
                    {% endif %}
                    {% if item.excerpt %}
                        <p class="text-sm text-on-surface-variant leading-relaxed mb-6">{{ item.excerpt }}</p>
                    {% endif %}
                    <a href="{{ item.get_absolute_url }}" class="font-label text-[10px] font-bold tracking-widest uppercase underline underline-offset-8">Leia mais</a>
                </div>
            </div>
        </article>
    {% endfor %}
{% endif %}
