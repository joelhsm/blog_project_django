{% if site_setup.show_search %}
<div class="w-full md:w-96">
    <div class="relative group">
        <input
            class="
            w-full h-14 pl-14 pr-6
            bg-surface-container-low
            border-none
            rounded-full
            text-on-surface
            placeholder:text-outline
            focus:ring-2
            focus:ring-primary/20
            focus:bg-surface-container-lowest
            transition-all
            duration-300
            "
            placeholder="Explore o blog..." type="text" />
        <div class="absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant">
            <span class="material-symbols-outlined" data-icon="search">search</span>
        </div>
    </div>
</div>
{% endif %}
