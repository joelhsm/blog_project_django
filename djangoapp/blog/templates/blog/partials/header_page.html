{% if site_setup.show_header %}
    {% if page %}
        <header class="mb-24">
            {% if page.created_at %}
                <div class="mb-4">
                    <span class="font-label font-bold text-on-surface-variant tracking-[0.05em] uppercase text-xs">
                        {{ page.created_at|date:"F j, Y" }}
                    </span>
                </div>
            {% endif %}
            {% if page.title %}
                <h1 class="font-headline text-5xl md:text-7xl lg:text-8xl text-on-surface leading-[0.95] tracking-tighter mb-12">
                    {{ page.title }}
                </h1>
            {% endif %}
            <div class="w-full h-[1px] bg-outline-variant/15"></div>
        </header>               
    {% endif %}
{% endif %}
